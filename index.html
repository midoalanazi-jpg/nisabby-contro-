<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم نظام رخص نصابي - النسخة الآمنة المحدثة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f6f9; color: #333; }
        .navbar-custom { background-color: #1e3a8a; color: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 24px; }
        .card-header-custom { background-color: #2563eb; color: white; border-radius: 12px 12px 0 0 !important; font-weight: bold; }
        .btn-primary { background-color: #2563eb; border: none; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; }
        .status-active { background-color: #d1fae5; color: #065f46; }
        .status-inactive { background-color: #fee2e2; color: #991b1b; }
        .table th { background-color: #f8fafc; color: #64748b; }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom py-3 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0 fw-bold">نظام رخص إضافة نصابي 📋 (النسخة الآمنة المحدثة)</h4>
            <span class="badge bg-danger text-white fs-6">صلاحيات المسؤول</span>
        </div>
    </nav>

    <div class="container">
        <div class="card mb-4 bg-dark text-white">
            <div class="card-body d-flex align-items-center gap-3">
                <span class="fw-bold fs-5">🔑 مفتاح الأمان لإدارة السيرفر:</span>
                <input type="password" id="adminSecretKey" class="form-control form-control-lg w-50" placeholder="أدخل الكود السري لتتمكن من الحفظ أو التعديل" value="NasabiAdmin2026">
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header card-header-custom py-3">
                        ➕ إضافة / تعديل مشترك
                    </div>
                    <div class="card-body">
                        <form id="subscriberForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">رقم الجوال</label>
                                <input type="text" id="phone" class="form-control" placeholder="مثال: 0541910003" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">تاريخ انتهاء الرخصه</label>
                                <input type="date" id="expireDate" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">حالة الحساب</label>
                                <select id="isActive" class="form-select">
                                    <option value="true">مفعّل (نشط)</option>
                                    <option value="false">موقوف</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">حفظ المشترك بالسيرفر</button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-dark text-white py-3 fw-bold d-flex justify-content-between align-items-center">
                        <span>👥 قائمة المشتركين المسجلين</span>
                        <button onclick="loadSubscribers()" class="btn btn-sm btn-outline-light">🔄 تحديث البيانات</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0 text-center">
                                <thead>
                                    <tr>
                                        <th>رقم الجوال</th>
                                        <th>تاريخ الانتهاء</th>
                                        <th>الحالة</th>
                                        <th>بصمة الجهاز (ID)</th>
                                        <th>الإجراءات</th>
                                    </tr>
                                </thead>
                                <tbody id="subscribersTableBody">
                                    <tr>
                                        <td colspan="5" class="py-4 text-muted">جاري تحميل البيانات من السيرفر...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCeFdc0LmfAKuFATA9VxI3k86ap6hcXdKg",
            authDomain: "nasabi-license-system.firebaseapp.com",
            projectId: "nasabi-license-system",
            storageBucket: "nasabi-license-system.firebasestorage.app",
            messagingSenderId: "288530631805",
            appId: "1:288530631805:web:a8a3fbc6a4205ee4e23514"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function loadSubscribers() {
            const tbody = document.getElementById('subscribersTableBody');
            tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-muted">جاري التحديث...</td></tr>`;
            
            try {
                const querySnapshot = await db.collection("subscribers").get();
                tbody.innerHTML = '';
                
                if (querySnapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-muted">لا يوجد أي مشتركين حالياً.</td></tr>`;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const docId = doc.id;
                    const phone = data.phone || docId;
                    const expire = data.expireDate || 'غير محدد';
                    const active = data.isActive === true || data.isActive === 'true';
                    const device = data.deviceId || '❌ غير مربوط بجهاز';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="fw-bold">${phone}</td>
                        <td><span class="text-secondary">${expire}</span></td>
                        <td><span class="status-badge ${active ? 'status-active' : 'status-inactive'}">${active ? 'نشط' : 'موقف'}</span></td>
                        <td style="font-size: 0.85rem;">${data.deviceId ? `<span class="badge bg-secondary">${device}</span>` : `<span class="text-muted">${device}</span>`}</td>
                        <td>
                            ${data.deviceId ? `<button onclick="unlinkDevice('${docId}', '${phone}', '${expire}', ${active})" class="btn btn-sm btn-warning me-1 fw-bold">فك الجهاز</button>` : ''}
                            <button onclick="deleteSubscriber('${docId}')" class="btn btn-sm btn-danger fw-bold">حذف</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error("Error: ", error);
                tbody.innerHTML = `<tr><td colspan="5" class="py-4 text-danger">فشل تحميل البيانات. تأكد من اتصال السيرفر واضغط تحديث البيانات.</td></tr>`;
            }
        }

        // دالة إضافة المشترك مع التوقيع الرقمي بالأمان
        document.getElementById('subscriberForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const secret = document.getElementById('adminSecretKey').value.trim();
            
            const phoneVal = document.getElementById('phone').value.trim();
            const expireVal = document.getElementById('expireDate').value;
            const activeVal = document.getElementById('isActive').value === "true";

            try {
                // نرسل الـ secretKey داخل المستند لتتحقق منه القواعد
                await db.collection("subscribers").doc(phoneVal).set({
                    phone: phoneVal,
                    expireDate: expireVal,
                    isActive: activeVal,
                    deviceId: "",
                    secretKey: secret // التوقيع المعتمد لتخطي الحماية
                });

                alert('تم حفظ وتأمين المشترك بنجاح بالسيرفر! 🛡️🎉');
                document.getElementById('subscriberForm').reset();
                loadSubscribers();
            } catch (error) {
                alert('فشل الحفظ! تأكد أن كود الأمان العلوي صحيح ومطابق لقواعد السيرفر.\nالخطأ: ' + error.message);
            }
        });

        // دالة الحذف الآمنة
        // دالة الحذف المحدثة والآمنة
window.deleteSubscriber = async function(id) {
    if(confirm('هل أنت متأكد من حذف هذا المشترك نهائياً من السيرفر؟')) {
        const secret = document.getElementById('adminSecretKey').value.trim();
        
        try {
            // خطوة ذكية: نقوم بتحديث المستند وتوقيعه بكلمة السر للتأكد من صلاحيتك قبل الحذف
            await db.collection("subscribers").doc(id).update({
                secretKey: secret
            });
            
            // بعد التحديث الناجح نقوم بالحذف فوراً
            await db.collection("subscribers").doc(id).delete();
            
            alert('تم حذف المشترك بنجاح! 🗑️');
            loadSubscribers();
        } catch (error) {
            alert('فشل الحذف! تأكد من كود الأمان العلوي.\nالخطأ: ' + error.message);
        }
    }
}

        // دالة فك ربط الجهاز الآمنة
        window.unlinkDevice = async function(id, phone, expire, active) {
            if(confirm(`هل تريد مسح بصمة الجهاز الحالية للمشترك ${phone}؟`)) {
                const secret = document.getElementById('adminSecretKey').value.trim();
                try {
                    await db.collection("subscribers").doc(id).set({
                        phone: phone,
                        expireDate: expire,
                        isActive: active,
                        deviceId: "",
                        secretKey: secret
                    });
                    loadSubscribers();
                } catch (error) {
                    alert('فشل فك الجهاز! تأكد من كود الأمان العلوي.\nالخطأ: ' + error.message);
                }
            }
        }

        window.onload = loadSubscribers;
    </script>
</body>
</html>
